<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move Logistics AI Assistant</title>
<link rel="stylesheet" href="/widget.css?v=5">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #F0F4FA;
  }

  /* Full-page chat window — no gaps, no rounded corners */
  .cps-chat-window {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    height: 100% !important;
    border-radius: 0 !important;
    display: -webkit-flex !important;
    display: flex !important;
    margin: 0 !important;
    padding: 0 !important;
    border: none !important;
    box-shadow: none !important;
    -webkit-animation: none !important;
    animation: none !important;
    z-index: 1 !important;
  }

  /* Hide the floating bubble */
  .cps-chat-bubble { display: none !important; }
</style>
</head>
<body>

<script src="/widget.js?v=5"></script>
<script>
  /* Auto-open immediately — no bubble click needed */
  (function () {
    function autoOpen() {
      var win = document.querySelector('.cps-chat-window');
      if (!win) { setTimeout(autoOpen, 50); return; }
      if (!win.classList.contains('open')) {
        win.classList.add('open');
      }
      var bubble = document.querySelector('.cps-chat-bubble');
      if (bubble) bubble.click();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', autoOpen);
    } else {
      autoOpen();
    }
  })();
</script>
<script>
  /* Override close button: close window or redirect to pitch.html */
  (function () {
    var check = setInterval(function () {
      var btn = document.querySelector('.cps-close-btn');
      if (!btn) return;
      clearInterval(check);
      var newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);
      newBtn.addEventListener('click', function () {
        if (window.opener) {
          window.close();
        } else {
          window.location.href = '/pitch.html';
        }
      });
    }, 50);
  })();
</script>

</body>
</html>
